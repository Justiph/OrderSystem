version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: order_system_db
    restart: always
    environment:
      POSTGRES_DB: order_system_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
